<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auva Kbihu AU - Estimasi</title>
    <link rel="icon" href="https://img.icons8.com/color/192/kaaba.png">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/192/kaaba.png">
    <style>
        :root { --primary: #2c3e50; --accent: #d4af37; --bg: #f4f7f6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .logo-box { text-align: center; font-size: 50px; margin-bottom: 5px; }
        h2 { text-align: center; margin: 0; color: var(--primary); font-size: 1.4rem; }
        .subtitle { text-align: center; color: #666; font-size: 0.9rem; margin-bottom: 15px; }
        .section-title { font-size: 0.75rem; text-transform: uppercase; color: var(--accent); font-weight: bold; margin: 15px 0 8px; border-bottom: 1px solid #eee; padding-bottom: 3px; }
        label { display: block; font-size: 0.8rem; color: #555; margin-bottom: 3px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 0.95rem; box-sizing: border-box; background: #fafafa; margin-bottom: 10px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .res-card { background: var(--primary); color: white; border-radius: 12px; padding: 15px; margin-top: 15px; }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 0.85rem; opacity: 0.9; }
        .highlight { color: var(--accent); font-weight: bold; font-size: 1.3rem; text-align: center; display: block; margin-top: 5px; }
        footer { text-align: center; font-size: 0.7rem; color: #999; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box">🕋</div>
    <h2>Estimasi Biaya Umroh</h2>
    <p class="subtitle">Auva Kbihu AU</p>

    <div class="section-title">Data Rombongan</div>
    <div class="row">
        <div><label>Total Orang</label><input type="number" id="totJam" value="35" oninput="hitung()"></div>
        <div><label>Gratis (FOC)</label><input type="number" id="jamGratis" value="1" oninput="input()"></div>
    </div>
    <label>Jumlah TL</label><input type="number" id="jamTL" value="1" oninput="hitung()">

    <div class="section-title">Komponen Biaya (Per Orang)</div>
    <label>Tiket Maskapai</label><input type="number" id="cTiket" value="15450000" oninput="hitung()">
    <label>LA / Hotel / Bus</label><input type="number" id="cLA" value="14450000" oninput="hitung()">
    
    <div class="row">
        <div><label>Asuransi</label><input type="number" id="cAsuransi" value="60000" oninput="hitung()"></div>
        <div><label>Handling</label><input type="number" id="cHandling" value="100000" oninput="hitung()"></div>
    </div>
    
    <div class="row">
        <div><label>Perlengkapan</label><input type="number" id="cAlat" value="1000000" oninput="hitung()"></div>
        <div><label>Diskon / PIC</label><input type="number" id="cPIC" value="0" oninput="hitung()"></div>
    </div>

    <div class="section-title">Margin Kantor</div>
    <label>Target Profit (%)</label><input type="number" id="cMargin" value="10" oninput="hitung()">

    <div class="res-card">
        <div class="res-item"><span>Total Modal:</span> <span id="resModal">0</span></div>
        <div style="text-align:center; margin-top:10px; font-size: 0.8rem;">Harga Jual Per Orang:</div>
        <span class="highlight" id="resJual">Rp 0</span>
    </div>

    <footer>&copy; 2026 Auva Kbihu AU</footer>
</div>

<script>
function hitung() {
    const totJam = parseFloat(document.getElementById('totJam').value) || 0;
    const jamGratis = parseFloat(document.getElementById('jamGratis').value) || 0;
    const jamTL = parseFloat(document.getElementById('jamTL').value) || 0;
    
    const cTiket = parseFloat(document.getElementById('cTiket').value) || 0;
    const cLA = parseFloat(document.getElementById('cLA').value) || 0;
    const cAsuransi = parseFloat(document.getElementById('cAsuransi').value) || 0;
    const cHandling = parseFloat(document.getElementById('cHandling').value) || 0;
    const cAlat = parseFloat(document.getElementById('cAlat').value) || 0;
    const cPIC = parseFloat(document.getElementById('cPIC').value) || 0;
    const cMargin = parseFloat(document.getElementById('cMargin').value) || 0;

    const jamBayar = totJam - jamGratis;
    const modalSatuan = cTiket + cLA + cAsuransi + cHandling + cAlat;
    const totalModal = totJam * modalSatuan;
    
    // Hitung harga jual dengan margin % dan dikurangi diskon PIC
    let hargaJual = (totalModal / jamBayar);
    hargaJual = hargaJual + (hargaJual * (cMargin/100)) - cPIC;

    document.getElementById('resModal').innerText = "Rp " + new Intl.NumberFormat('id-ID').format(totalModal);
    document.getElementById('resJual').innerText = "Rp " + new Intl.NumberFormat('id-ID').format(Math.ceil(hargaJual));
}
window.onload = hitung;
</script>

</body>
</html>
