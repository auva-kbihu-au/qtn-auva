<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Auva Kbihu AU</title>

<link rel="icon" href="https://img.icons8.com/color/192/kaaba.png">
<link rel="apple-touch-icon" href="https://img.icons8.com/color/192/kaaba.png">

<link rel="manifest" href='data:application/manifest+json,{
"name":"Auva Kbihu AU",
"short_name":"Auva",
"display":"standalone",
"theme_color":"#1a5d4a",
"background_color":"#f4f7f6",
"icons":[
{"src":"https://img.icons8.com/color/192/kaaba.png","sizes":"192x192","type":"image/png"}
]}'>

<meta name="theme-color" content="#1a5d4a">

<style>
:root {
--primary:#1a5d4a;
--accent:#c9a227;
--bg:#f4f7f6;
--white:#fff;
}

body{
font-family:system-ui;
background:var(--bg);
margin:0;
padding:15px;
}

.card{
background:#fff;
border-radius:15px;
padding:20px;
max-width:500px;
margin:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.logo{
text-align:center;
margin-bottom:10px;
}

.logo img{
width:80px;
}

h2{
text-align:center;
color:var(--primary);
margin:0;
}

.sub{
text-align:center;
color:#777;
margin-bottom:20px;
}

.title{
color:var(--accent);
font-size:13px;
margin-top:15px;
border-bottom:1px solid #eee;
}

.group{
margin-top:10px;
}

label{
font-size:12px;
font-weight:bold;
}

input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:5px;
margin-bottom:10px;
}

.row{
display:flex;
gap:10px;
}

.row div{
flex:1;
}

.btn{
width:100%;
padding:15px;
background:var(--primary);
color:white;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
}

.result{
display:none;
background:var(--primary);
color:white;
margin-top:15px;
padding:15px;
border-radius:15px;
}

.item{
display:flex;
justify-content:space-between;
margin:8px 0;
}

.price{
color:var(--accent);
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="https://img.icons8.com/color/96/kaaba.png">
</div>

<h2>Estimasi Umroh</h2>
<div class="sub">Auva Kbihu AU</div>

<div class="title">Data</div>

<div class="row">
<div>
<label>Total</label>
<input type="number" id="totJam" value="35">
</div>

<div>
<label>Gratis</label>
<input type="number" id="jamGratis" value="1">
</div>

<div>
<label>TL</label>
<input type="number" id="numTL" value="1">
</div>
</div>

<div class="title">Biaya</div>

<div class="group">
<label>Tiket</label>
<input type="number" id="cTiket" value="15450000">

<label>Hotel</label>
<input type="number" id="cLA" value="14450000">

<div class="row">
<div>
<label>Asuransi</label>
<input type="number" id="cAsuransi" value="60000">
</div>

<div>
<label>Handling</label>
<input type="number" id="cHandling" value="100000">
</div>
</div>

<div class="row">
<div>
<label>Diskon</label>
<input type="number" id="cPIC" value="0">
</div>

<div>
<label>Perlengkapan</label>
<input type="number" id="cAlat" value="1000000">
</div>
</div>

<label>Aplikasi</label>
<input type="number" id="cAplikasi" value="60000">
</div>

<div class="title">Profit</div>

<input type="number" id="profitPct" value="10">

<button class="btn" onclick="hitung()">HITUNG</button>

</div>

<div class="result" id="hasil">

<div class="item">
<span>Modal</span>
<span id="sub"></span>
</div>

<div class="item">
<span>Profit</span>
<span id="pk"></span>
</div>

<div class="item">
<span>TL</span>
<span id="tl"></span>
</div>

<div class="item">
<span>Bersih</span>
<span id="pb"></span>
</div>

<div class="item">
<span>Harga</span>
<span id="hj" class="price"></span>
</div>

</div>

<script>
function hitung(){

let nJam=+totJam.value
let nFoc=+jamGratis.value
let nTL=+numTL.value
let p=+profitPct.value/100

let subtotal=+cTiket.value+ +cLA.value+ +cAsuransi.value+ +cHandling.value+ +cPIC.value+ +cAlat.value+ +cAplikasi.value

let total=subtotal*nJam
let pk=total*p
let tl=subtotal*nTL
let pb=pk-tl

let bayar=nJam-nFoc
let harga=(total+pk)/bayar

let f=n=>"Rp "+Math.ceil(n).toLocaleString("id-ID")

hasil.style.display="block"

sub.innerText=f(subtotal)
pk.innerText=f(pk)
tl.innerText=f(tl)
pb.innerText=f(pb)
hj.innerText=f(harga)

}
</script>

</body>
</html>
